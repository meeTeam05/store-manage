<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Store Manage | My Orders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css?v=20260620">
</head>
<body class="catalog-body">
  <header class="site-header">
    <a class="brand" href="index.html">Store Manage</a>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="cart.html">Cart</a>
      <a href="login.html" data-auth-link>Sign In</a>
    </nav>
  </header>

  <main class="orders-shell">
    <section class="dashboard-heading">
      <p class="eyebrow">Customer Orders</p>
      <h1>My Local Orders</h1>
      <p id="orders-session" class="status"></p>
      <p class="orders-note">This history lasts only for the current browser session and resets when a new session starts.</p>
    </section>

    <section id="orders-empty" class="payment-card" hidden>
      <p class="summary-card-title">No Orders Yet</p>
      <p class="payment-meta">Place a local test order from the payment page and it will appear here.</p>
      <div class="confirmation-actions">
        <a class="button primary" href="index.html">Browse Product</a>
        <a class="button" href="cart.html">Open Cart</a>
      </div>
    </section>

    <section id="orders-list" class="orders-list"></section>
  </main>

  <script src="assets/js/storefront-data.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api-client.js"></script>
  <script src="assets/js/storefront-state.js"></script>
  <script src="assets/js/session-shell.js"></script>
  <script src="assets/js/orders.js"></script>
</body>
</html>
