<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maison Aureline | Product</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="catalog-body">
  <header class="site-header">
    <a class="brand" href="index.html">Maison Aureline</a>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="cart.html">Cart</a>
      <a href="login.html">Sign In</a>
    </nav>
  </header>

  <main class="product-shell">
    <section class="product-layout">
      <div class="product-gallery">
        <img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?auto=format&fit=crop&w=1200&q=80" alt="Structured black coat front view">
        <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?auto=format&fit=crop&w=1200&q=80" alt="Structured black coat styling view">
      </div>
      <div class="product-detail">
        <p class="eyebrow">Outerwear</p>
        <h1>Structured Coat</h1>
        <p class="price">4.900.000 VND</p>
        <p class="description">
          Long-line black coat with quiet shoulder structure, fluid drape, and a disciplined silhouette for day-to-evening wear.
        </p>

        <div class="option-group">
          <span>Size</span>
          <div class="chip-row">
            <button class="chip is-active" type="button">S</button>
            <button class="chip" type="button">M</button>
            <button class="chip" type="button">L</button>
          </div>
        </div>

        <div class="option-group">
          <span>Color</span>
          <div class="chip-row">
            <button class="chip is-active" type="button">Black</button>
            <button class="chip" type="button">Ivory</button>
          </div>
        </div>

        <div class="product-actions">
          <a class="button primary" href="cart.html">Add To Cart</a>
          <a class="button" href="login.html">Save To Wishlist</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
