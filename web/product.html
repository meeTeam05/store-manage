<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Store Manage | Product</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260620">
</head>
<body class="catalog-body">
  <header class="site-header">
    <a class="brand" href="index.html">Store Manage</a>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="cart.html">Cart</a>
      <a href="login.html" data-auth-link>Sign In</a>
    </nav>
  </header>

  <main class="product-shell">
    <section class="product-layout">
      <div id="product-gallery" class="product-gallery">
      </div>
      <div class="product-detail">
        <p id="product-category" class="eyebrow">Outerwear</p>
        <h1 id="product-title">Structured Coat</h1>
        <p id="product-price" class="price">4.900.000 VND</p>
        <p id="product-description" class="description"></p>

        <div class="option-group">
          <span>Size</span>
          <div id="size-row" class="chip-row">
          </div>
        </div>

        <div class="option-group">
          <span>Color</span>
          <div id="color-row" class="chip-row">
          </div>
        </div>

        <div class="product-actions">
          <button id="add-to-cart" class="button primary" type="button">Add To Cart</button>
          <a id="wishlist-link" class="button" href="login.html">Save To Wishlist</a>
        </div>
        <p id="product-status" class="status"></p>
      </div>
    </section>
  </main>

  <script src="storefront-data.js"></script>
  <script src="api-client.js"></script>
  <script src="storefront-state.js"></script>
  <script src="session-shell.js"></script>
  <script src="product.js"></script>
</body>
</html>
