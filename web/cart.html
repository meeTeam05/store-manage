<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Store Manage | Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="catalog-body">
  <header class="site-header">
    <a class="brand" href="index.html">Store Manage</a>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="product.html">Product</a>
      <a href="login.html">Sign In</a>
    </nav>
  </header>

  <main class="cart-shell">
    <section class="cart-layout">
      <div class="cart-items">
        <p class="eyebrow">Cart</p>
        <h1>Your Selection</h1>
        <p id="cart-empty-state" class="status" hidden>Your cart is empty.</p>
        <div id="cart-items-list"></div>
      </div>

      <aside class="cart-summary">
        <p class="eyebrow">Order Summary</p>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="summary-subtotal">0 VND</span>
        </div>
        <div class="summary-row">
          <span>Voucher</span>
          <span id="summary-discount">0 VND</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="summary-total">0 VND</span>
        </div>
        <a id="checkout-link" class="button primary full-width" href="login.html">Continue To Payment</a>
      </aside>
    </section>
  </main>

  <script src="storefront-data.js"></script>
  <script src="api-client.js"></script>
  <script src="storefront-state.js"></script>
  <script src="cart.js"></script>
</body>
</html>
