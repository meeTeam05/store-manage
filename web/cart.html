<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maison Aureline | Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="catalog-body">
  <header class="site-header">
    <a class="brand" href="index.html">Maison Aureline</a>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="product.html">Product</a>
      <a href="login.html">Sign In</a>
    </nav>
  </header>

  <main class="cart-shell">
    <section class="cart-layout">
      <div class="cart-items">
        <p class="eyebrow">Cart</p>
        <h1>Your Selection</h1>

        <article class="cart-item">
          <img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?auto=format&fit=crop&w=800&q=80" alt="Structured black coat">
          <div class="cart-copy">
            <h2>Structured Coat</h2>
            <p>Black / Size M</p>
            <p>Qty 2</p>
          </div>
          <p class="price">4.900.000 VND</p>
        </article>
      </div>

      <aside class="cart-summary">
        <p class="eyebrow">Order Summary</p>
        <div class="summary-row">
          <span>Subtotal</span>
          <span>9.800.000 VND</span>
        </div>
        <div class="summary-row">
          <span>Voucher</span>
          <span>-980.000 VND</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span>8.820.000 VND</span>
        </div>
        <a class="button primary full-width" href="login.html">Proceed To Checkout</a>
      </aside>
    </section>
  </main>
</body>
</html>
