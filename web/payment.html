<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Store Manage | Payment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="catalog-body">
  <header class="site-header">
    <a class="brand" href="index.html">Store Manage</a>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="product.html">Product</a>
      <a href="cart.html">Cart</a>
    </nav>
  </header>

  <main class="payment-shell">
    <section class="payment-layout">
      <section class="payment-card">
        <p class="eyebrow">Payment</p>
        <h1>Confirm payment before placing the local test order.</h1>
        <p class="payment-lead">
          This step stays inside the local shell so you can validate the customer flow without a live backend.
        </p>

        <div id="payment-info" class="info-grid"></div>

        <form id="payment-form" class="payment-form">
          <div class="payment-option-list">
            <label class="payment-option">
              <input type="radio" name="payment-method" value="Cash" checked>
              <div>
                <strong>Cash On Delivery</strong>
                <p>Use this for the simplest local checkout path.</p>
              </div>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment-method" value="BankTransfer">
              <div>
                <strong>Bank Transfer</strong>
                <p>Simulate a manual transfer confirmation flow.</p>
              </div>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment-method" value="EWallet">
              <div>
                <strong>E-Wallet</strong>
                <p>Use the same local method your C++ demo flow already models.</p>
              </div>
            </label>
          </div>

          <button class="button primary full-width" type="submit">Place Local Test Order</button>
          <p id="payment-status" class="status" aria-live="polite"></p>
        </form>
      </section>

      <aside class="payment-card">
        <p class="summary-card-title">Order Summary</p>
        <div id="payment-items" class="payment-items"></div>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="payment-subtotal">0 VND</span>
        </div>
        <div class="summary-row">
          <span>Voucher</span>
          <span id="payment-discount">0 VND</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="payment-total">0 VND</span>
        </div>
      </aside>
    </section>
  </main>

  <script src="assets/js/storefront-data.js"></script>
  <script src="assets/js/api-client.js"></script>
  <script src="assets/js/storefront-state.js"></script>
  <script src="assets/js/payment.js"></script>
</body>
</html>
