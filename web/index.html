<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Store Manage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css?v=20260620">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Store Manage</a>
    <nav class="nav">
      <a href="product.html">Product</a>
      <a href="cart.html">Cart</a>
      <a href="login.html" data-auth-link>Sign In</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <img
        src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?auto=format&fit=crop&w=1600&q=80"
        alt="Luxury fashion campaign"
      >
      <div class="hero-copy">
        <p class="eyebrow">Resort 2026</p>
        <h1>Store Manage</h1>
        <p>Local storefront shell for testing product, cart, payment, and role-based flows around the C++ core.</p>
        <div class="hero-actions">
          <a class="button primary" href="#catalog-section">Explore Catalog</a>
          <a class="button" href="product.html">View Product</a>
          <a class="button" href="login.html">Sign In</a>
        </div>
      </div>
    </section>

    <section id="catalog-section" class="grid-section">
      <div class="section-heading">
        <p>Catalog</p>
        <h2>Our Collection</h2>
      </div>
      <div class="slider-wrapper">
        <button class="slider-btn prev-btn" id="slider-prev" type="button" aria-label="Previous">&larr;</button>
        <div id="product-grid" class="product-slider">
          <!-- dynamically loaded product-cards -->
        </div>
        <button class="slider-btn next-btn" id="slider-next" type="button" aria-label="Next">&rarr;</button>
      </div>
      <div class="slider-dots" id="slider-dots">
        <!-- indicators render here -->
      </div>
    </section>
  </main>
  <script src="assets/js/storefront-data.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api-client.js"></script>
  <script src="assets/js/storefront-state.js"></script>
  <script src="assets/js/session-shell.js"></script>
  <script src="assets/js/index.js"></script>
</body>
</html>
